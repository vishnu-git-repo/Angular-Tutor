<div class="min-h-dvh flex justify-center items-center bg-surface-50">
  <div class="card w-full max-w-md border shadow-4 border-round-xl p-5 relative">

    <!-- Title -->
    <div class="flex justify-center mb-4">
      <h2 class="text-2xl font-semibold text-primary text-center">
        Create Account
      </h2>
    </div>

    <form class="flex flex-col items-center gap-3 border" (ngSubmit)="handleRegister()">

      <!-- Name -->
      <p-iftalabel class="border border-zinc-700 rounded-lg">
        <input
          pInputText
          id="reg_name"
          class="w-80 px-3 pt-5 pb-2 focus:outline-none focus:border-zinc-400"
          [value]="registerData().Name"
          (input)="setField('Name', $any($event.target).value)"
        />
        <label for="reg_name">Name</label>
      </p-iftalabel>

      <!-- Email -->
      <p-iftalabel class="border border-zinc-700 rounded-lg">
        <input
          pInputText
          id="reg_email"
          class="w-80 px-3 pt-5 pb-2 focus:outline-none focus:border-zinc-400"
          [value]="registerData().Email"
          (input)="setField('Email', $any($event.target).value)"
        />
        <label for="reg_email">Email</label>
      </p-iftalabel>

      <!-- Password -->
      <p-iftalabel class="border border-zinc-700 rounded-lg">
        <input
          pInputText
          type="password"
          id="reg_password"
          class="w-80 px-3 pt-5 pb-2 focus:outline-none focus:border-zinc-400"
          [value]="registerData().Password"
          (input)="setField('Password', $any($event.target).value)"
        />
        <label for="reg_password">Password</label>
      </p-iftalabel>

      <!-- Re-Password -->
      <p-iftalabel class="border border-zinc-700 rounded-lg">
        <input
          pInputText
          type="password"
          id="reg_repassword"
          class="w-80 px-3 pt-5 pb-2 focus:outline-none focus:border-zinc-400"
          [value]="re_password()"
          (input)="re_password.set($any($event.target).value)"
        />
        <label for="reg_repassword">Confirm Password</label>
      </p-iftalabel>

      <!-- Gender -->
      <p-iftalabel class="border border-zinc-700 rounded-lg">
        <p-select
          id="reg_gender"
          [options]="[
            { label: 'Male', value: 'Male' },
            { label: 'Female', value: 'Female' },
            { label: 'Other', value: 'Other' }
          ]"
          [ngModel]="registerData().Gender"
          (ngModelChange)="setField('Gender', $event)"
          placeholder="Select Gender"
          class="w-80 px-3 pt-5 pb-2 focus:outline-none focus:border-zinc-400"
        />
        <label for="reg_gender">Gender</label>
      </p-iftalabel>

      <!-- Address -->
      <p-iftalabel class="border border-zinc-700 rounded-lg">
        <textarea
          pInputTextarea
          rows="2"
          id="reg_address"
          class="w-full"
          [value]="registerData().Address"
          (input)="setField('Address', $any($event.target).value)"
        ></textarea>
        <label for="reg_address">Address</label>
      </p-iftalabel>

      <!-- Phone -->
      <p-iftalabel class="border border-zinc-700 rounded-lg">
        <input
          pInputText
          id="reg_phone"
          class="w-full"
          [value]="registerData().Phone"
          (input)="setField('Phone', $any($event.target).value)"
        />
        <label for="reg_phone">Phone</label>
      </p-iftalabel>

      <!-- Submit -->
      <p-button
        type="submit"
        label="Register"
        styleClass="w-80"
        severity="success">
      </p-button>

      <!-- Login -->
      <div class="text-center mt-2">
        Already have an account?
        <a
          routerLink="/login"
          class="text-primary font-medium hover:underline cursor-pointer"
        >
          Sign up
        </a>
      </div>

      <!-- Error -->
      <div *ngIf="error().Status" class="mt-2">
        <p-message severity="error" [text]="error().Message"></p-message>
      </div>

    </form>
  </div>
</div>
