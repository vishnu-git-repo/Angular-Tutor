<div class="min-h-screen flex items-center justify-center bg-surface-900 px-4">

  <div class="w-full max-w-md bg-surface-800 p-8 border-round-2xl shadow-8">

    <!-- Title -->
    <div class="text-center mb-7">
      <h2 class="text-3xl font-semibold text-white mb-2">
        Welcome to Inventory!
      </h2>
      <p class="text-sm text-color-secondary">
        Register to continue to your dashboard
      </p>
    </div>

    <!-- Form -->
    <form class="flex flex-col items-center gap-5" (ngSubmit)="handleRegister()">

      <!-- Name -->
      <p-iftalabel class="border border-zinc-700 rounded-lg">
        <input
          pInputText
          id="reg_name"
          class="w-80 px-3 pt-5 pb-2 focus:outline-none focus:border-zinc-400"
          [value]="registerData().Name"
          (input)="setField('Name', $any($event.target).value)"
        />
        <label for="reg_name">Name</label>
      </p-iftalabel>

      <!-- Email -->
      <p-iftalabel class="border border-zinc-700 rounded-lg">
        <input
          pInputText
          id="reg_email"
          class="w-80 px-3 pt-5 pb-2 focus:outline-none focus:border-zinc-400"
          [value]="registerData().Email"
          (input)="setField('Email', $any($event.target).value)"
        />
        <label for="reg_email">Email</label>
      </p-iftalabel>

      <!-- Password -->
      <p-iftalabel class="border border-zinc-700 rounded-lg">
        <input
          pInputText
          type="password"
          id="reg_password"
          class="w-80 px-3 pt-5 pb-2 focus:outline-none focus:border-zinc-400"
          [value]="registerData().Password"
          (input)="setField('Password', $any($event.target).value)"
        />
        <label for="reg_password">Password</label>
      </p-iftalabel>

      <!-- Confirm Password -->
      <p-iftalabel class="border border-zinc-700 rounded-lg">
        <input
          pInputText
          type="password"
          id="reg_repassword"
          class="w-80 px-3 pt-5 pb-2 focus:outline-none focus:border-zinc-400"
          [value]="re_password()"
          (input)="re_password.set($any($event.target).value)"
        />
        <label for="reg_repassword">Confirm Password</label>
      </p-iftalabel>

      <!-- Gender -->
      <p-iftalabel class="border border-zinc-700 rounded-lg">
        <p-select
          id="reg_gender"
          [options]="[
            { label: 'Male', value: 'Male' },
            { label: 'Female', value: 'Female' },
            { label: 'Other', value: 'Other' }
          ]"
          name = "Gender"
          [ngModel]="registerData().Gender"
          (ngModelChange)="setField('Gender', $event)"
          placeholder="Select Gender"
          class="w-80"
        />
        <label for="reg_gender">Gender</label>
      </p-iftalabel>

      <!-- Address -->
      <p-iftalabel class="border border-zinc-700 rounded-lg">
        <textarea
          pInputTextarea
          rows="2"
          id="reg_address"
          class="w-80 px-3 pt-5 pb-2 focus:outline-none focus:border-zinc-400"
          [value]="registerData().Address"
          (input)="setField('Address', $any($event.target).value)"
        ></textarea>
        <label for="reg_address">Address</label>
      </p-iftalabel>

      <!-- Phone -->
      <p-iftalabel class="border border-zinc-700 rounded-lg">
        <input
          pInputText
          id="reg_phone"
          class="w-80 px-3 pt-5 pb-2 focus:outline-none focus:border-zinc-400"
          [value]="registerData().Phone"
          (input)="setField('Phone', $any($event.target).value)"
        />
        <label for="reg_phone">Phone</label>
      </p-iftalabel>

      <!-- Error -->
      <p-message
        class="w-80"
        *ngIf="error().Status"
        severity="error"
        [text]="error().Message">
      </p-message>

      <!-- Submit -->
      <p-button
        type="submit"
        label="Register"
        styleClass="w-80"
        severity="primary"
        [loading]="isRegistering()"
      >
      </p-button>

    </form>

    <!-- Footer -->
    <div class="text-center mt-6 text-sm text-color-secondary">
      Already have an account?
      <a
        routerLink="/login"
        class="text-primary font-medium hover:underline ml-1">
        Sign in
      </a>
    </div>

  </div>
</div>
