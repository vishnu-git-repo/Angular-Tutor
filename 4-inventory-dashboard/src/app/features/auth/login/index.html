<div class="min-h-screen flex items-center justify-center bg-surface-900 px-4">
  <div class="w-full max-w-md bg-surface-800 p-8 border-round-2xl shadow-8">

    <!-- Title -->
    <div class="text-center mb-7">
      <h2 class="text-3xl font-semibold text-white mb-2">
        Welcome Back
      </h2>
      <p class="text-sm text-color-secondary">
        Sign in to continue to your dashboard
      </p>
    </div>
    <!-- Form -->
    <form class="flex flex-col items-center gap-5" (ngSubmit)="handleLogin()">

      <p-iftalabel class="border border-zinc-700 rounded-lg">
        <input pInputText id="login_email" class="w-80 px-3 pt-5 pb-2 focus:outline-none focus:border-zinc-400"
          [value]="loginData().Email" (input)="setField('Email', $any($event.target).value)" />
        <label for="login_email">Email</label>
      </p-iftalabel>

      <p-iftalabel class="border border-zinc-700 rounded-lg">
        <input pInputText type="password" id="login_password"
          class="w-80 px-3 pt-5 pb-2 focus:outline-none focus:border-zinc-400" [value]="loginData().Password"
          (input)="setField('Password', $any($event.target).value)" />
        <label for="login_password">Password</label>
      </p-iftalabel>

      <p-message class="w-80" *ngIf="error().Status" severity="error" [text]="error().Message">
      </p-message>

      <p-button type="submit" label="Login" styleClass="w-80" severity="primary" [loading]="isLoggingIn()">
      </p-button>
    </form>

    <!-- Footer -->
    <div class="text-center mt-6 text-sm text-color-secondary">
      Don’t have an account?
      <a routerLink="/register" class="text-primary font-medium hover:underline ml-1">
        Create one
      </a>
    </div>
    <div class="text-center mt-1 text-sm text-color-secondary">
      Forget password?
      <a (click)="openForgot()" class="text-primary font-medium hover:underline ml-1 cursor-pointer">
        Reset
      </a>
    </div>
  </div>

  <p-dialog header="Forgot Password" [modal]="true" [(visible)]="Dialog().forgot" [style]="{ width: '25rem' }">
    <div class="md:p-5">
      <div class="flex flex-col gap-4 mt-2 md:px-5 md:pt-3">
        <p-iftalabel class="border border-zinc-700 rounded-lg">
          <input pInputText class="w-full px-3 pt-5 pb-2" [(ngModel)]="resetData().Email" />
          <label>Email</label>
        </p-iftalabel>

        <p-button label="Send OTP" severity="primary" styleClass="w-full" [loading]="ButtonState().sendOtp"
          [disabled]="ButtonState().sendOtp" (onClick)="handleSendOtp()">
        </p-button>
      </div>
    </div>
  </p-dialog>

  <p-dialog header="Verify OTP" [modal]="true" [(visible)]="Dialog().otp" [style]="{ width: '25rem' }">

    <div class="flex flex-col items-center gap-4 mt-3">

      <p class="text-sm text-color-secondary text-center">
        Enter the 6 digit OTP sent to your email
      </p>

      <p-inputOtp [length]="6" [(ngModel)]="resetData().Otp">
      </p-inputOtp>

      <p-button label="Verify OTP" severity="primary" styleClass="w-full mt-3" [loading]="ButtonState().verifyOtp"
        [disabled]="ButtonState().verifyOtp" (onClick)="handleVerifyOtp()">
      </p-button>

    </div>
  </p-dialog>

  <p-dialog header="Reset Password" [modal]="true" [(visible)]="Dialog().reset" [style]="{ width: '25rem' }">

    <div class="flex flex-col gap-4 mt-2">

      <p-iftalabel class="border border-zinc-700 rounded-lg">
        <input pInputText type="password" class="w-full px-3 pt-5 pb-2" [(ngModel)]="resetData().NewPassword" />
        <label>New Password</label>
      </p-iftalabel>

      <p-iftalabel class="border border-zinc-700 rounded-lg">
        <input pInputText type="password" class="w-full px-3 pt-5 pb-2" [(ngModel)]="resetData().ConfirmPassword" />
        <label>Confirm Password</label>
      </p-iftalabel>

      <p-button label="Reset Password" severity="primary" styleClass="w-full" [loading]="ButtonState().resetPassword"
        [disabled]="ButtonState().resetPassword" (onClick)="handleResetPassword()">
      </p-button>

    </div>
  </p-dialog>
</div>
