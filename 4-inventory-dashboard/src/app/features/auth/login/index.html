<div class="min-h-screen flex items-center justify-center bg-surface-900 px-4">

  <div class="w-full max-w-md bg-surface-800 p-8 border-round-2xl shadow-8">

    <!-- Title -->
    <div class="text-center mb-7">
      <h2 class="text-3xl font-semibold text-white mb-2">
        Welcome Back
      </h2>
      <p class="text-sm text-color-secondary">
        Sign in to continue to your dashboard
      </p>
    </div>

    <!-- Form -->
    <form class="flex flex-col items-center gap-5" (ngSubmit)="handleLogin()">

      <p-iftalabel class="border border-zinc-700 rounded-lg">
        <input
          pInputText  
          id="login_email"
          class="w-80 px-3 pt-5 pb-2 focus:outline-none focus:border-zinc-400"
          [value]="loginData().Email"
          (input)="setField('Email', $any($event.target).value)"
        />
        <label for="login_email">Email</label>
      </p-iftalabel>

      <p-iftalabel class="border border-zinc-700 rounded-lg">
        <input
          pInputText
          type="password"
          id="login_password"
          class="w-80 px-3 pt-5 pb-2 focus:outline-none focus:border-zinc-400"
          [value]="loginData().Password"
          (input)="setField('Password', $any($event.target).value)"
        />
        <label for="login_password">Password</label>
      </p-iftalabel>

      <p-message
        class="w-80"
        *ngIf="error().Status"
        severity="error"
        [text]="error().Message">
      </p-message>

      <p-button
        type="submit"
        label="Login"
        styleClass="w-80"
        severity="primary"
        [loading]="isLoggingIn()">
      </p-button>

    </form>

    <!-- Footer -->
    <div class="text-center mt-6 text-sm text-color-secondary">
      Don’t have an account?
      <a routerLink="/register"
         class="text-primary font-medium hover:underline ml-1">
        Create one
      </a>
    </div>

  </div>
</div>
