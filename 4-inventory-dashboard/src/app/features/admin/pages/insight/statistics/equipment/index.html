<main class="p-8 space-y-12">

    <!-- ================= STATUS ================= -->

    <section>

        <h4 class="text-xs tracking-widest text-zinc-400 uppercase mb-6">
            Status Distribution
        </h4>

        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">

            @for(status of statusList; track status.key) {

            <div class="flex flex-col gap-3 p-5 rounded-xl bg-zinc-900 border border-zinc-800 hover:border-zinc-700 transition">

                <div class="flex justify-between items-center text-sm">
                    <span class="text-zinc-300">{{status.key}}</span>

                    <span class="px-2 py-1 text-xs font-semibold rounded-md"
                        [style.background]="getStatusStyle(status.key).background"
                        [style.color]="getStatusStyle(status.key).color">
                        {{ status.value }}
                    </span>
                </div>

                <div class="h-3 w-full rounded-lg overflow-hidden bg-zinc-800">

                    <div class="h-full transition-all duration-2000 rounded-lg"
                        [style.background]="getStatusStyle(status.key).color"
                        [style.width.%]="animateBars() ? getPercentage(status.value) : 0">
                    </div>

                </div>

                <span class="text-xs text-zinc-500">
                    {{getPercentage(status.value)}}%
                </span>

            </div>

            }

        </div>

    </section>



    <!-- ================= CONDITION ================= -->

    <section>

        <h4 class="text-xs tracking-widest text-zinc-400 uppercase mb-6">
            Condition Distribution
        </h4>

        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">

            @for(condition of conditionList; track condition.key) {

            <div class="flex flex-col gap-3 p-5 rounded-xl bg-zinc-900 border border-zinc-800 hover:border-zinc-700 transition">

                <div class="flex justify-between items-center text-sm">
                    <span class="text-zinc-300">{{condition.key}}</span>

                    <span class="px-2 py-1 text-xs font-semibold rounded-md"
                        [style.background]="getConditionStyle(condition.key).background"
                        [style.color]="getConditionStyle(condition.key).color">
                        {{ condition.value }}
                    </span>
                </div>

                <div class="h-3 w-full rounded-lg overflow-hidden bg-zinc-800">

                    <div class="h-full transition-all duration-2000 rounded-lg"
                        [style.background]="getConditionStyle(condition.key).color"
                        [style.width.%]="animateBars() ? getPercentage(condition.value) : 0">
                    </div>

                </div>

                <span class="text-xs text-zinc-500">
                    {{getPercentage(condition.value)}}%
                </span>

            </div>

            }

        </div>

    </section>

</main>
